<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>石榴湾家具超市三合店 — 好评生成器</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 二维码库 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- 顶部装饰条 -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <span class="top-bar-icon">&#x1F3E0;</span>
      <span class="top-bar-text">石榴湾家具超市三合店</span>
      <span class="top-bar-tag">自建卖场 · 无租金 · 价格更实惠</span>
    </div>
  </div>

  <!-- 店招区域 -->
  <div class="shop-header">
    <div class="shop-logo-wrap">
      <div class="shop-logo">&#x1F4CA;</div>
    </div>
    <div class="shop-info">
      <h1 class="shop-name">石榴湾家具超市三合店</h1>
      <p class="shop-sub">原甲林村三合家具家电广场</p>
      <p class="shop-addr">&#x1F4CD; 镇平县晁陂镇甲林村甲林冷库对面，老312国道路南，石佛寺路口往西三公里</p>
      <div class="shop-tags">
        <span class="shop-tag">12,000㎡ 大型卖场</span>
        <span class="shop-tag">软床/实木床</span>
        <span class="shop-tag">布艺/真皮沙发</span>
        <span class="shop-tag">餐桌茶台</span>
        <span class="shop-tag">家用电器</span>
        <span class="shop-tag">衣柜/博古架</span>
        <span class="shop-tag">办公家具</span>
      </div>
    </div>
  </div>

  <!-- 平台选择 -->
  <div class="platform-section">
    <p class="platform-label">选择发布平台：</p>
    <div class="platform-btns">
      <button class="platform-btn" data-platform="douyin" id="btn-douyin">&#x1F3B5; 抖音</button>
      <button class="platform-btn active" data-platform="gaode" id="btn-gaode">&#x1F5FA; 高德地图</button>
    </div>
  </div>

  <!-- 生成按钮 -->
  <div class="generate-section">
    <button class="generate-btn" id="btn-generate">
      <span class="btn-shine"></span>
      &#x2728; 随机生成好评
    </button>
  </div>

  <!-- 结果卡片 -->
  <div class="result-card" id="result-card" style="display:none;">
    <div class="result-header">
      <span class="result-platform" id="result-platform"></span>
      <span class="result-dimension" id="result-dimension"></span>
    </div>
    <div class="result-content" id="result-content"></div>
    <div class="result-actions">
      <button class="copy-btn" id="btn-copy">&#x1F4CB; 一键复制</button>
      <button class="change-btn" id="btn-change">&#x1F504; 换一条</button>
    </div>
  </div>

  <!-- 二维码区域 -->
  <div class="qrcode-section" id="qrcode-section" style="display:none;">
    <p class="qrcode-label">扫码查看好评内容：</p>
    <div class="qrcode-wrap" id="qrcode-wrap"></div>
  </div>

  <!-- 底部计数 -->
  <div class="footer-counter">
    已生成好评：<span id="counter">0</span> 条
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <!-- 脚本 -->
  <script src="data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
